services:
  litchat:
    build:
      context: .
      dockerfile: Dockerfile
    image: litchat-staging:latest
    container_name: litchat-staging
    restart: unless-stopped
    ports:
      - "${LITCHAT_PORT:-3001}:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
